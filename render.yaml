services:
  # ─── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: ai-resume-copilot-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: ohio
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-copilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-resume-copilot-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://your-vercel-frontend-url.vercel.app"]'
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false # You must enter this manually in the Render dashboard
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        value: resume-copilot-files
      - key: DEBUG
        value: "false"

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  - type: redis
    name: ai-resume-copilot-redis
    region: ohio
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Empty list means only internal Render services can access this Redis

databases:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  - name: ai-resume-copilot-db
    region: ohio
    plan: free
    databaseName: resume_copilot
    user: resumeai
